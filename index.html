<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="WLT Planning">
<title>WLT Planning</title>
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--steel:#1a2740;--steel-mid:#2a3f60;--accent:#e8a020;--bg:#f0f2f5;--card:#fff;--text:#1a2740;--muted:#6b7a92;--border:#d8dde6}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:linear-gradient(135deg,var(--steel) 0%,var(--steel-mid) 100%);color:#fff;padding:14px 16px 10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(26,39,64,.3)}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.logo{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:var(--steel);flex-shrink:0}
.hdr-titles{flex:1}.hdr-title{font-size:17px;font-weight:700}.hdr-sub{font-size:11px;opacity:.6;margin-top:1px}
.sbtn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:5px 8px;font-size:10px;text-align:right;line-height:1.6;cursor:pointer;flex-shrink:0;color:#fff}
.sbtn:active{background:rgba(255,255,255,.2)}
.sdot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#22c55e;margin-right:3px;vertical-align:middle}
.sdot.spin{background:var(--accent);animation:pulse 1s infinite}.sdot.err{background:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.pick{display:flex;align-items:center;gap:8px}
.esel{flex:1;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);border-radius:8px;color:#fff;font-size:14px;font-weight:600;padding:8px 10px;appearance:none;-webkit-appearance:none;outline:none;cursor:pointer}
.esel option{color:var(--text);background:#fff}
.arr{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);border-radius:8px;color:#fff;font-size:16px;padding:7px 11px;cursor:pointer;flex-shrink:0;line-height:1}
.arr:active{background:rgba(255,255,255,.25)}
.wrap{padding:14px;max-width:600px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.sc{background:var(--card);border-radius:12px;padding:11px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.sn{font-size:22px;font-weight:800;color:var(--steel);line-height:1}
.sl{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
.week{margin-bottom:18px}
.whdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.wpill{background:var(--steel);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase}
.wlbl{font-size:12px;color:var(--muted);font-weight:500}.wlbl.cur{color:var(--accent);font-weight:700}.wlbl.past{color:var(--muted);font-style:italic}.dc.pastday{opacity:0.6}
.verlofoverzicht{background:var(--card);border-radius:12px;padding:13px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.vrow{display:flex;align-items:baseline;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid var(--border);gap:8px;font-size:12px}
.vrow:last-child{border-bottom:none}
.vrow.vnow{background:#fef3c7;margin:0 -4px;padding:5px 4px;border-radius:6px;border-bottom:none}
.vnaam{font-weight:600;color:var(--text);flex-shrink:0}
.vper{color:var(--muted);text-align:right}
.dc{background:var(--card);border-radius:12px;margin-bottom:6px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;border-left:4px solid transparent}
.dc.tod{border-left-color:var(--accent);background:#fffbf2}.dc.we{opacity:.4}.dc.emp{opacity:.28}
.dhdr{display:flex;align-items:center;padding:9px 13px;gap:8px}
.dn{font-size:12px;font-weight:700;color:var(--muted);width:26px;text-transform:uppercase;flex-shrink:0}
.dd{font-size:13px;font-weight:600}
.ttag{background:var(--accent);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;text-transform:uppercase}
.dfree{font-size:11px;color:var(--muted);margin-left:auto;font-style:italic}
.dbody{padding:0 13px 10px;display:flex;flex-direction:column;gap:5px}
.task{border-radius:9px;padding:8px 10px;display:flex;align-items:flex-start;gap:8px;border:1px solid transparent}
.tleft{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;min-width:44px}
.cbadge{font-size:10px;font-weight:800;padding:3px 7px;border-radius:5px;white-space:nowrap;letter-spacing:.3px;text-align:center;width:100%}
.tbadge{font-size:9px;font-weight:700;padding:2px 4px;border-radius:5px;white-space:nowrap;text-align:center;width:100%;line-height:1.3}
.tinfo{flex:1;min-width:0}
.tmeta{display:flex;align-items:center;gap:5px;margin-bottom:2px;flex-wrap:wrap}
.tord{font-size:10px;font-weight:700;color:var(--muted)}
.petag{font-size:9px;background:#e2e8f0;color:#475569;padding:1px 5px;border-radius:4px;font-weight:600}
.tprod{font-size:13px;font-weight:600;line-height:1.3;word-break:break-word}
.tklant{font-size:11px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tdl{font-size:10px;color:#dc2626;margin-top:3px;font-weight:600}
.act-btns{display:flex;gap:6px;margin-top:7px}
.collega{font-size:10px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:4px}
.collega-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0}
.abtn{display:inline-flex;align-items:center;gap:4px;border:none;border-radius:7px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;text-decoration:none;font-family:inherit;line-height:1.2}
.abtn-done{background:#16a34a;color:#fff}
.abtn-done:active{background:#15803d}
.abtn-call{background:#e2e8f0;color:#1a2740}
.abtn-call:active{background:#cbd5e1}
.cx{background:#eff6ff;border-color:#bfdbfe}.cx .cbadge{background:#2563eb;color:#fff}.cx .tbadge{background:#dbeafe;color:#1d4ed8}
.cg{background:#f0fdf4;border-color:#bbf7d0}.cg .cbadge{background:#16a34a;color:#fff}.cg .tbadge{background:#dcfce7;color:#15803d}
.ci{background:#faf5ff;border-color:#e9d5ff}.ci .cbadge{background:#7c3aed;color:#fff}.ci .tbadge{background:#ede9fe;color:#6d28d9}
.cpr{background:#fff7ed;border-color:#fed7aa}.cpr .cbadge{background:#ea580c;color:#fff}.cpr .tbadge{background:#ffedd5;color:#c2410c}
.cps{background:#ecfeff;border-color:#a5f3fc}.cps .cbadge{background:#0891b2;color:#fff}.cps .tbadge{background:#cffafe;color:#0e7490}
.co{background:#fffbeb;border-color:#fde68a}.co .cbadge{background:#d97706;color:#fff}.co .tbadge{background:#fef3c7;color:#b45309}
.cv{background:#fdf2f8;border-color:#fbcfe8}.cv .cbadge{background:#db2777;color:#fff}.cv .tbadge{background:#fce7f3;color:#be185d}
.cl{background:#f7fee7;border-color:#d9f99d}.cl .cbadge{background:#65a30d;color:#fff}.cl .tbadge{background:#ecfccb;color:#4d7c0f}
.ct{background:#fdf4ff;border-color:#e9d5ff}.ct .cbadge{background:#9333ea;color:#fff}.ct .tbadge{background:#f3e8ff;color:#7e22ce}
.cb{background:#f8fafc;border-color:#e2e8f0}.cb .cbadge{background:#94a3b8;color:#fff}.cb .tbadge{background:#f1f5f9;color:#64748b}
.cot{background:#f1f5f9;border-color:#cbd5e1}.cot .cbadge{background:#475569;color:#fff}.cot .tbadge{background:#e2e8f0;color:#334155}
.verlof{background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:7px 11px;font-size:12px;color:#92400e;display:flex;align-items:center;gap:6px}
.leg{background:var(--card);border-radius:12px;padding:13px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.ltitle{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.lgrid{display:grid;grid-template-columns:1fr 1fr;gap:4px 10px}
.lrow{display:flex;align-items:center;gap:6px;font-size:11px}
.ldot{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.cmsg{text-align:center;padding:48px 20px;color:var(--muted)}
.cicon{font-size:44px;margin-bottom:10px}
.ctitle{font-size:15px;font-weight:600;margin-bottom:5px;color:var(--text)}
.csub{font-size:12px;line-height:1.6}
.spin2{display:inline-block;width:30px;height:30px;border:3px solid #e2e8f0;border-top-color:var(--steel);border-radius:50%;animation:rot .7s linear infinite;margin-bottom:12px}
@keyframes rot{to{transform:rotate(360deg)}}
.notice{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:12px;color:#1e40af;line-height:1.6}
.notice b{display:block;margin-bottom:3px;font-size:13px}
</style>
</head>

function loadXLSX(){return new Promise((res,rej)=>{if(window.XLSX){res();return;}const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});}

async function fetchFromWorker(){
  await loadXLSX();
  const r=await fetch(WORKER_URL);
  if(!r.ok)throw new Error('Worker HTTP '+r.status);
  const buf=await r.arrayBuffer();
  const b=new Uint8Array(buf.slice(0,4));
  if(!(b[0]===0x50&&b[1]===0x4B))throw new Error('Geen geldig Excel');
  const wb=XLSX.read(buf,{type:'array',cellDates:true});
  const wsName=wb.SheetNames.find(n=>n==='Blad1')||wb.SheetNames[0];
  const ws=wb.Sheets[wsName];

  const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:true});
  return parseRows(raw);
}

function parseDate(v){
  if(v===null||v===undefined) return '';
  try{
    if(v instanceof Date && !isNaN(v.getTime())) return fmt(v);
    if(typeof v==='number'){
      if(v>40000&&v<80000){
        const d=new Date(Math.round((v-25569)*864e5));
        if(!isNaN(d.getTime())) return fmt(d);
      }
      return '';
    }
    if(typeof v==='string'){
      if(v.match(/^\d{4}-\d{2}-\d{2}/)) return v.substring(0,10);
      // Handle "6/1/26" or "6/1/2026" format
      if(v.match(/^\d{1,2}\/\d{1,2}\/\d{2,4}$/)){
        const d=new Date(v);
        if(!isNaN(d.getTime())) return fmt(d);
      }
      // Handle "01-06-2026" format
      if(v.match(/^\d{2}-\d{2}-\d{4}$/)){
        const parts=v.split('-');
        const d=new Date(parts[2]+'-'+parts[1]+'-'+parts[0]);
        if(!isNaN(d.getTime())) return fmt(d);
      }
    }
  }catch(e){}
  return '';
}

function findDateRow(raw){
  for(let r=0;r<20;r++){
    const row=raw[r];if(!row)continue;
    for(let c=9;c<20;c++){
      const v=row[c];
      if(v instanceof Date && !isNaN(v.getTime()) && v.getFullYear()>2020) return r;
      if(typeof v==='number'&&v>40000&&v<80000) return r;
      if(typeof v==='string'&&v.match(/^\d{4}-\d{2}-\d{2}/)) return r;
      // Handle "6/1/26" or "01-06-2026" format
      if(typeof v==='string'&&v.match(/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}$/)) return r;
    }
  }
  return 5;
}

function parseRows(raw){
  const dateRow=findDateRow(raw);
  const dr=raw[dateRow]||[];
  const dataStart=dateRow+2; // data starts 2 rows after date row

  const data=[];
  let foundData=0;
  for(let i=dataStart;i<raw.length;i++){
    const row=raw[i];if(!row)continue;
    const pers=row[7]?String(row[7]).trim():null;if(!pers||pers==='pers.')continue;
    const lv=row[3];let lev='';
    try{lev=parseDate(lv);}catch(e){}
    const pl={};
    for(let c=9;c<row.length;c++){
      const v=row[c];if(v===null||v===undefined||String(v).trim()==='')continue;
      const dc=dr[c];if(!dc&&dc!==0)continue;
      const ds=parseDate(dc);
      if(ds)pl[ds]=String(v).trim().toUpperCase();
    }
    data.push({ordernr:row[0]?String(row[0]).trim():'',klant:row[1]?String(row[1]).trim():'',product:row[2]?String(row[2]).trim():'',leverdatum:lev,proj:row[5]?String(row[5]).trim():'',taak:row[6]?String(row[6]).trim().toUpperCase():'',pers,planning:pl});
    foundData++;
  }

  return data;
}

function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

async function syncNow(){
  setSS('spin','Ophalen...');
  document.getElementById('stime').textContent='';
  if(!WORKER_URL){
    DATA=SNAPSHOT;setSS('ok','Snapshot');document.getElementById('stime').textContent='ingebouwd';afterLoad(true);return;
  }
  try{
    DATA=await fetchFromWorker();
    localStorage.setItem('wlt_cache',JSON.stringify({ts:Date.now(),data:DATA}));
    setSS('ok','Live');document.getElementById('stime').textContent='zojuist';
    fetch(WORKER_URL+'/engineers').then(r=>r.json()).then(d=>{
      PLANNING_EMAIL=d.planningEmail||PLANNING_EMAIL;
      Object.entries(d.engineers||{}).forEach(([k,v])=>{
        PE_TEL[k]=v.tel||'';PE_EMAIL[k]=v.email||'';PE_NAAM[k]=v.naam||k;
      });
      // Herrender de planning nu de engineer-gegevens beschikbaar zijn
      const savedEmp=localStorage.getItem('wlt_emp');
      if(savedEmp&&typeof renderPlan==='function')renderPlan(savedEmp);
    }).catch(()=>{});
    afterLoad(false);
  }catch(e){
    setSS('err','Fout');document.getElementById('stime').textContent=e.message.slice(0,22);
    const cached=localStorage.getItem('wlt_cache');
    if(cached){try{const o=JSON.parse(cached);DATA=o.data;const m=Math.round((Date.now()-o.ts)/60000);setSS('ok','Cache');document.getElementById('stime').textContent=m<60?m+'m geleden':Math.round(m/60)+'u geleden';afterLoad(false);return;}catch(e2){}}
    DATA=SNAPSHOT;setSS('ok','Snapshot');document.getElementById('stime').textContent='lokaal';afterLoad(true);
  }
}

function afterLoad(snap){
  buildEmps();
  const s=localStorage.getItem('wlt_emp');
  if(s&&emps.find(e=>e.code===s)){document.getElementById('empSel').value=s;selEmp(s);}
  else{document.getElementById('main').innerHTML=(snap?'<div class="notice"><b>Info: Snapshot-data</b>Worker nog niet ingesteld. Zie de handleiding voor live updates.</div>':'')+'<div class="cmsg"><div class="cicon">&#128119;</div><div class="ctitle">Planning geladen</div><div class="csub">Kies hierboven je naam.</div></div>';}
}

function buildEmps(){
  const m={};
  DATA.forEach(r=>{const k=r.pers.toUpperCase();if(!m[k]){let n=r.pers;if(r.ordernr==='verlof'&&r.product&&r.product!==r.pers)n=r.product;m[k]={code:r.pers,name:n};}else if(r.ordernr==='verlof'&&r.product&&r.product!==r.pers&&!m[k].name.includes(' '))m[k].name=r.product;});
  emps=Object.values(m).sort((a,b)=>a.name.localeCompare(b.name));
  const sel=document.getElementById('empSel');
  while(sel.options.length>1)sel.remove(1);
  emps.forEach(e=>{const o=document.createElement('option');o.value=e.code;o.textContent=e.name!==e.code?e.name:e.code;sel.appendChild(o);});
}
function selEmp(c){if(!c)return;localStorage.setItem('wlt_emp',c);curI=emps.findIndex(e=>e.code===c);document.getElementById('empSel').value=c;const e=emps.find(e=>e.code===c);document.getElementById('hdrSub').textContent=e?(e.name!==e.code?e.name:e.code):c;renderPlan(c);}
function prevEmp(){if(curI>0){curI--;const c=emps[curI].code;document.getElementById('empSel').value=c;selEmp(c);}}
function nextEmp(){if(curI<emps.length-1){curI++;const c=emps[curI].code;document.getElementById('empSel').value=c;selEmp(c);}}

function actBtns(t,ds){
  const emp=document.getElementById('hdrSub').textContent||'';
  const dd=new Date(ds);
  const dNL=dd.getDate()+' '+NL_M[dd.getMonth()]+' '+dd.getFullYear();
  const taakNm=TAAK_N[t.taak.replace('.','')]||t.taak;
  const projUp=(t.proj||'').toUpperCase().trim();
  // Direct zoeken op PE-code (bijv. 'AB', 'RH')
  const projKey=PE_EMAIL.hasOwnProperty(projUp)?projUp:(Object.keys(PE_EMAIL).find(k=>k===projUp)||'');
  const peEmail=projKey?PE_EMAIL[projKey]:'';
  const peNaam=projKey?PE_NAAM[projKey]:(t.proj||'');
  const peTel=projKey?PE_TEL[projKey]:'';
  const subj=encodeURIComponent(t.ordernr+' - '+t.klant+' - '+taakNm+' - '+emp);
  const to=PLANNING_EMAIL+(peEmail?';'+peEmail:'');
  const body=encodeURIComponent(
    'Beste '+(peNaam?peNaam+' en ':'')+'planning,\n\n'+
    'De volgende activiteit is gereed:\n\n'+
    'Order:      '+t.ordernr+'\n'+
    'Klant:      '+t.klant+'\n'+
    'Product:    '+t.product+'\n'+
    'Taak:       '+taakNm+'\n'+
    'Medewerker: '+emp+'\n'+
    'Gepland op: '+dNL+
    '\n\nMet vriendelijke groet,\n'+emp);
  let h='<div class="act-btns">';
  h+='<a class="abtn abtn-done" href="mailto:'+to+'?subject='+subj+'&body='+body+'">&#10003; Gereed melden</a>';
  if(peTel)h+='<a class="abtn abtn-call" href="tel:'+peTel+'">&#128222; Bel PE</a>';
  h+='</div>';
  return h;
}

function renderPlan(code){
  const rows=DATA.filter(r=>r.pers.toUpperCase()===code.toUpperCase());
  // collegaMap: dag|ordernr|taak -> [personen]
  const collegaMap={};
  DATA.filter(r=>r.ordernr!=='verlof'&&r.ordernr).forEach(r=>{
    Object.entries(r.planning).forEach(([d])=>{
      const key=d+'|'+r.ordernr+'|'+r.taak;
      if(!collegaMap[key])collegaMap[key]=[];
      if(!collegaMap[key].includes(r.pers))collegaMap[key].push(r.pers);
    });
  });

  const dm={},vs=new Set();
  rows.forEach(r=>{if(r.ordernr==='verlof'){Object.keys(r.planning).forEach(d=>vs.add(d));return;}Object.entries(r.planning).forEach(([d,c])=>{if(!dm[d])dm[d]=[];dm[d].push({...r,code:c});});});
  const days=Array.from({length:28},(_,i)=>{const d=new Date(today);d.setDate(today.getDate()-7+i);return d;});
  let nT=0,nV=0;const ord=new Set();
  days.forEach(d=>{const ds=fmt(d);(dm[ds]||[]).forEach(t=>{nT++;if(t.ordernr)ord.add(t.ordernr);});if(vs.has(ds))nV++;});
  const weeks=[];let cw=null;
  days.forEach(d=>{const wn=wk(d);if(!cw||cw.n!==wn){cw={n:wn,days:[]};weeks.push(cw);}cw.days.push(d);});
  let h='<div class="stats"><div class="sc"><div class="sn">'+nT+'</div><div class="sl">Taken</div></div><div class="sc"><div class="sn">'+ord.size+'</div><div class="sl">Orders</div></div><div class="sc"><div class="sn">'+nV+'</div><div class="sl">Verlof</div></div></div>'+legend(code);
  weeks.forEach(week=>{
    const isCur=week.days.some(d=>fmt(d)===fmt(today));
    const isPast=week.days.every(d=>new Date(fmt(d))<new Date(fmt(today)));
    h+='<div class="week"><div class="whdr"><span class="wpill">Wk '+week.n+'</span><span class="wlbl'+(isCur?' cur':isPast?' past':'')+'">'+( isCur?'&#9889; Huidige week':isPast?'&#8592; '+wkR(week.days):wkR(week.days))+'</span></div>';
    week.days.forEach(d=>{
      const ds=fmt(d),dw=d.getDay(),isT=ds===fmt(today),isWE=dw===0||dw===6;
      const tasks=dm[ds]||[],isV=vs.has(ds);
      const isPastDay=new Date(ds)<new Date(fmt(today));
      let cls='dc';if(isT)cls+=' tod';else if(isWE)cls+=' we';else if(!tasks.length&&!isV)cls+=' emp';
      if(isPastDay&&!isT)cls+=' pastday';
      h+='<div class="'+cls+'"><div class="dhdr"><span class="dn">'+NL_D[dw]+'</span><span class="dd">'+d.getDate()+' '+NL_M[d.getMonth()]+'</span>';
      if(isT)h+='<span class="ttag">vandaag</span>';
      if(isWE)h+='<span class="dfree">weekend</span>';
      if(!isWE&&!tasks.length&&!isV)h+='<span class="dfree">geen taken</span>';
      h+='</div>';
      if(isV||tasks.length){
        h+='<div class="dbody">';
        if(isV)h+='<div class="verlof">&#127958;&#65039; Verlof / Niet aanwezig</div>';
        tasks.forEach(t=>{
          const cc=CODE_C[t.code]||'cot',tnk=t.taak.replace('.','');
          const tn=TAAK_N[tnk]||t.taak,tk=TAAK_K[tnk]||'#64748b';
          const dl=t.leverdatum&&dlS(t.leverdatum,d)?'<div class="tdl">&#9888; Leverdatum: '+t.leverdatum+'</div>':'';
          const cKey=ds+'|'+t.ordernr+'|'+t.taak;
          const cPersonen=(collegaMap[cKey]||[]).filter(p=>p.toUpperCase()!==code.toUpperCase());
          const collHtml=cPersonen.length?'<div class="collega"><span class="collega-dot"></span>samen met: '+cPersonen.join(', ')+'</div>':'';
          h+='<div class="task '+cc+'"><div class="tleft">'+(tn?'<span class="tbadge" style="background:'+tk+'20;color:'+tk+';font-size:11px;padding:4px 7px">'+tn+'</span>':'')+'</div><div class="tinfo"><div class="tmeta"><span class="tord">'+t.ordernr+'</span>'+(t.proj&&t.proj!=='-'?'<span class="petag">PE: '+t.proj+'</span>':'')+'</div><div class="tprod">'+t.product+'</div><div class="tklant">'+t.klant+'</div>'+dl+collHtml+actBtns(t,ds)+'</div></div>';
        });
        h+='</div>';
      }
      h+='</div>';
    });
    h+='</div>';
  });
  document.getElementById('main').innerHTML=h;
  // Scroll naar vandaag
  setTimeout(()=>{
    const todayEl=document.querySelector('.dc.tod');
    if(todayEl){
      todayEl.scrollIntoView({behavior:'smooth',block:'center'});
    } else {
      window.scrollTo(0,0);
    }
  },80);
}

function legend(empCode){
  const NL_M2=['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
  const horizon=new Date(today);horizon.setDate(today.getDate()+90);
  const pastLimit=new Date(today);pastLimit.setDate(today.getDate()-7);
  const verlofMap={};
  DATA.forEach(r=>{
    if(r.ordernr!=='verlof')return;
    if(empCode && r.pers.toUpperCase()!==empCode.toUpperCase())return;
    const dates=Object.keys(r.planning).sort();
    if(!dates.length)return;
    const relevant=dates.filter(d=>{const dd=new Date(d);return dd>=pastLimit&&dd<=horizon;});
    if(!relevant.length)return;
    const naam=r.product||r.pers;
    if(!verlofMap[naam])verlofMap[naam]=[];
    verlofMap[naam].push(...relevant);
  });
  function toPeriods(dates){
    const sorted=[...new Set(dates)].sort();
    const periods=[];let start=sorted[0],prev=sorted[0];
    for(let i=1;i<sorted.length;i++){
      const diff=(new Date(sorted[i])-new Date(prev))/864e5;
      if(diff<=3){prev=sorted[i];}else{periods.push({start,end:prev});start=sorted[i];prev=sorted[i];}
    }
    periods.push({start,end:prev});return periods;
  }
  function fmtP(s,e){
    const sd=new Date(s),ed=new Date(e);
    if(s===e)return sd.getDate()+' '+NL_M2[sd.getMonth()];
    if(sd.getMonth()===ed.getMonth())return sd.getDate()+' – '+ed.getDate()+' '+NL_M2[ed.getMonth()];
    return sd.getDate()+' '+NL_M2[sd.getMonth()]+' – '+ed.getDate()+' '+NL_M2[ed.getMonth()];
  }
  const entries=Object.entries(verlofMap).sort((a,b)=>(a[1].sort()[0]||'').localeCompare(b[1].sort()[0]||''));
  if(!entries.length)return '';
  const rows=entries.map(([naam,dates])=>{
    const periods=toPeriods(dates);
    const ps=periods.map(p=>fmtP(p.start,p.end)).join(', ');
    const isNow=dates.includes(fmt(today));
    return '<div class="vrow'+(isNow?' vnow':'')+'"><span class="vnaam">'+naam+'</span><span class="vper">'+ps+'</span></div>';
  }).join('');
  return '<div class="verlofoverzicht"><div class="ltitle">&#127958;&#65039; Verlof komende periode</div>'+rows+'</div>';
}
function setSS(s,t){const d=document.getElementById('sdot'),st=document.getElementById('sstat');d.className='sdot'+(s==='spin'?' spin':s==='err'?' err':'');st.textContent=t;}
function wk(d){const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())),dn=dt.getUTCDay()||7;dt.setUTCDate(dt.getUTCDate()+4-dn);const y0=new Date(Date.UTC(dt.getUTCFullYear(),0,1));return Math.ceil((((dt-y0)/864e5)+1)/7);}
function wkR(days){const f=days[0],l=days[days.length-1];return f.getDate()+' '+NL_M[f.getMonth()]+' &#8211; '+l.getDate()+' '+NL_M[l.getMonth()];}
function dlS(lev,ref){if(!lev||lev.length<8)return false;const d=(new Date(lev)-ref)/864e5;return d>=0&&d<=7;}

syncNow();
setInterval(()=>{if(WORKER_URL)syncNow();},30*60*1000);
</script>
