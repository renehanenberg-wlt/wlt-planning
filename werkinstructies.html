<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --steel:#1a2740;--steel-mid:#2a3f60;--accent:#e8a020;
  --bg:#f0f2f5;--card:#fff;--text:#1a2740;--muted:#6b7a92;--border:#d8dde6;
  --green:#16a34a;--radius:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px}

/* HEADER */
.hdr{background:linear-gradient(135deg,var(--steel) 0%,var(--steel-mid) 100%);color:#fff;padding:14px 16px 12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(26,39,64,.3)}
.hdr-top{display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:var(--steel);flex-shrink:0;overflow:hidden}
.logo img{width:34px;height:34px;object-fit:contain;border-radius:8px}
.hdr-titles{flex:1}
.hdr-title{font-size:17px;font-weight:700}
.hdr-sub{font-size:11px;opacity:.6;margin-top:1px}
.back-btn{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);border-radius:8px;color:#fff;font-size:13px;font-weight:600;padding:7px 12px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px}

/* SEARCH BAR */
.search-wrap{padding:14px 16px 10px;max-width:600px;margin:0 auto}
.search-box{display:flex;align-items:center;background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;gap:8px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.search-box input{flex:1;border:none;outline:none;font-size:15px;font-family:inherit;color:var(--text);background:transparent}
.search-box input::placeholder{color:var(--muted)}
.search-icon{color:var(--muted);font-size:16px;flex-shrink:0}
.clear-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:0;display:none}

/* CATEGORIE CHIPS */
.cats-wrap{padding:0 16px 12px;max-width:600px;margin:0 auto}
.cats{display:flex;flex-wrap:wrap;gap:8px;padding-bottom:4px}
.cats::-webkit-scrollbar{display:none}
.cat-chip{border:1.5px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;background:var(--card);color:var(--muted);white-space:nowrap;transition:all .15s;flex-shrink:0}
.cat-chip.act{background:var(--steel);color:#fff;border-color:var(--steel)}

/* INHOUD */
.wrap{padding:0 16px;max-width:600px;margin:0 auto}

/* CATEGORIE SECTIE */
.cat-section{margin-bottom:20px}
.cat-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.cat-badge{background:var(--steel);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px;letter-spacing:.5px;text-transform:uppercase}
.cat-count{font-size:11px;color:var(--muted)}

/* INSTRUCTIE KAART */
.wi-card{background:var(--card);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.07);display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--text);transition:transform .1s,box-shadow .1s;border-left:4px solid transparent;cursor:pointer}
.wi-card:active{transform:scale(.98)}
.wi-card.has-link{border-left-color:var(--accent)}
.wi-icon{width:40px;height:40px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.wi-info{flex:1;min-width:0}
.wi-title{font-size:14px;font-weight:700;line-height:1.3}
.wi-desc{font-size:12px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wi-arrow{color:var(--muted);font-size:18px;flex-shrink:0}
.wi-card.has-link .wi-arrow{color:var(--accent)}

/* LEEG / LADEN */
.state-msg{text-align:center;padding:60px 20px;color:var(--muted)}
.state-icon{font-size:48px;margin-bottom:12px}
.state-title{font-size:16px;font-weight:600;margin-bottom:6px;color:var(--text)}
.state-sub{font-size:13px;line-height:1.6}
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--steel);border-radius:50%;animation:rot .7s linear infinite;margin:0 auto 16px}
@keyframes rot{to{transform:rotate(360deg)}}

/* CATEGORIE ICONEN */
.cat-icons{'E&I':'⚡','Lassen':'🔥','Monteren':'🔧','Veiligheid':'🦺','Pneumatiek':'💨','Algemeen':'📋'}

/* RESULTAAT TELLER */
.result-info{font-size:12px;color:var(--muted);margin-bottom:12px}
</style>
</head>

const CAT_IMG_ICON={'PED / Productie Drukhoudend':PED_ICON_URL,'Pneumatiek':PNEU_ICON_URL};
function catIconHtml(cat,size){
  size=size||20;
  if(CAT_IMG_ICON[cat])return '<img src="'+CAT_IMG_ICON[cat]+'" style="width:'+size+'px;height:'+size+'px;object-fit:contain;vertical-align:middle">';
  return catIcon(cat);
}

// Categorie kleuren
const CAT_COL={
  'E&I':'#2563eb','Lassen':'#dc2626','Assemblage':'#16a34a','Asssemblage':'#16a34a','Monteren':'#16a34a',
  'Veiligheid en PBM':'#d97706','Veiligheid':'#d97706',
  'PED / Productie Drukhoudend':'#ea580c','Pneumatiek':'#0e7490',
  'Algemeen':'#64748b','default':'#1a2740'
};
function catColor(cat){return CAT_COL[cat]||CAT_COL['default'];}

let DOCS=[];
let FILE_INDEX={}; // bestandsnaam (lowercase) -> {id, webUrl}
let activeCat='Alle';
let zoekTerm='';

// Logo
const b64=localStorage.getItem('wlt_icon_b64');

// SheetJS laden
function loadXLSX(){return new Promise((res,rej)=>{if(window.XLSX){res();return;}const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});}

async function loadFileIndex(){
  try{
    const r=await fetch(WORKER_URL+'/werkinstructies');
    if(!r.ok)return;
    const d=await r.json();
    (d.files||[]).forEach(f=>{
      FILE_INDEX[f.naam.toLowerCase()]=f;
    });
    console.log('Bestandsindex geladen:',Object.keys(FILE_INDEX).length,'bestanden');
  }catch(e){
    console.warn('Bestandsindex niet beschikbaar:',e.message);
  }
}

async function loadDocs(){
  try{
    await loadXLSX();
    const r=await fetch(WORKER_URL+'?sheet='+SHEET_NAME);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const buf=await r.arrayBuffer();
    const b=new Uint8Array(buf.slice(0,4));
    if(!(b[0]===0x50&&b[1]===0x4B))throw new Error('Geen geldig Excel');
    const wb=XLSX.read(buf,{type:'array'});

    // Zoek het werkinstructie tabblad
    const wsName=wb.SheetNames.find(n=>n.toLowerCase().includes('werkinstructie'))||wb.SheetNames[0];
    const ws=wb.Sheets[wsName];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});

    // Rij 0 = headers: titel, omschrijving, categorie, link, actief
    DOCS=[];
    for(let i=1;i<rows.length;i++){
      const row=rows[i];
      const titel=String(row[0]||'').trim();
      const omschrijving=String(row[1]||'').trim();
      const categorie=String(row[2]||'').trim()||'Algemeen';
      const link=String(row[3]||'').trim();
      const actiefRaw=row[4];
      // Standaard actief, tenzij expliciet op 0/false/nee gezet
      const actief=!(actiefRaw===0||actiefRaw==='0'||String(actiefRaw).toLowerCase()==='false'||String(actiefRaw).toLowerCase()==='nee');
      if(!titel||!actief)continue;
      DOCS.push({titel,omschrijving,categorie,link});
    }

    buildCats();
    render();
  }catch(e){
    document.getElementById('content').innerHTML=
      '<div class="state-msg"><div class="state-icon">⚠️</div>'+
      '<div class="state-title">Kan instructies niet laden</div>'+
      '<div class="state-sub">'+e.message+'<br><br><button onclick="loadDocs()" style="background:var(--steel);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13px;cursor:pointer">Opnieuw proberen</button></div></div>';
  }
}

function buildCats(){
  const cats=['Alle',...new Set(DOCS.map(d=>d.categorie))].sort((a,b)=>a==='Alle'?-1:b==='Alle'?1:a.localeCompare(b));
  const wrap=document.getElementById('catChips');
  wrap.innerHTML=cats.map(c=>
    '<span class="cat-chip'+(c===activeCat?' act':'')+'" onclick="setCat(\''+c.replace(/'/g,'\\\'')+'\')">'+(c==='Alle'?'Alle':catIconHtml(c,15)+' '+c)+'</span>'
  ).join('');
}

function setCat(cat){
  activeCat=cat;
  buildCats();
  render();
}

function filterDocs(){
  zoekTerm=document.getElementById('fZoek').value.toLowerCase().trim();
  document.getElementById('clearBtn').style.display=zoekTerm?'block':'none';
  render();
}

function clearSearch(){
  document.getElementById('fZoek').value='';
  zoekTerm='';
  document.getElementById('clearBtn').style.display='none';
  render();
}

function render(){
  // Filter
  let gefilterd=DOCS.filter(d=>{
    if(activeCat!=='Alle'&&d.categorie!==activeCat)return false;
    if(zoekTerm&&!(d.titel.toLowerCase().includes(zoekTerm)||d.omschrijving.toLowerCase().includes(zoekTerm)))return false;
    return true;
  });

  const info=document.getElementById('resultInfo');
  if(zoekTerm||activeCat!=='Alle'){
    info.style.display='block';
    info.textContent=gefilterd.length+' instructie'+(gefilterd.length!==1?'s':'')+' gevonden';
  } else {
    info.style.display='none';
  }

  if(!gefilterd.length){
    document.getElementById('content').innerHTML=
      '<div class="state-msg"><div class="state-icon">🔍</div>'+
      '<div class="state-title">Geen resultaten</div>'+
      '<div class="state-sub">Probeer een andere zoekterm of categorie</div></div>';
    return;
  }

  // Groepeer per categorie
  let html='';
  if(activeCat==='Alle'&&!zoekTerm){
    // Toon per categorie gesorteerd
    const catGroups={};
    gefilterd.forEach(d=>{
      if(!catGroups[d.categorie])catGroups[d.categorie]=[];
      catGroups[d.categorie].push(d);
    });
    Object.entries(catGroups).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([cat,docs])=>{
      const col=catColor(cat);
      html+='<div class="cat-section">';
      html+='<div class="cat-header">';
      html+='<span class="cat-badge" style="background:'+col+'">'+catIconHtml(cat,14)+' '+cat+'</span>';
      html+='<span class="cat-count">'+docs.length+' instructie'+(docs.length!==1?'s':'')+'</span>';
      html+='</div>';
      docs.forEach(d=>{html+=wiCard(d);});
      html+='</div>';
    });
  } else {
    gefilterd.forEach(d=>{html+=wiCard(d);});
  }

  document.getElementById('content').innerHTML=html;
}

function wiCard(d){
  const col=catColor(d.categorie);
  const hasLink=!!d.link;
  const icon=catIconHtml(d.categorie,22);
  const onclick=hasLink?'openDoc(\''+d.link.replace(/'/g,'\\\'')+'\')'  :'';
  return '<div class="wi-card'+(hasLink?' has-link':'')+'" onclick="'+onclick+'" style="'+(hasLink?'border-left-color:'+col:'')+'">'
    +'<div class="wi-icon" style="background:'+col+'22">'+icon+'</div>'
    +'<div class="wi-info">'
    +'<div class="wi-title">'+d.titel+'</div>'
    +(d.omschrijving?'<div class="wi-desc">'+d.omschrijving+'</div>':'')
    +'</div>'
    +(hasLink?'<div class="wi-arrow">&#8250;</div>':'<div class="wi-arrow" style="opacity:.2">&#8250;</div>')
    +'</div>';
}

async function openDoc(link){
  if(link.startsWith('http')){
    window.open(link,'_blank');
    return;
  }
  // Zoek bestand op in de index
  const key=link.toLowerCase();
  const file=FILE_INDEX[key];
  if(file){
    // Open via Worker proxy — geen inloggen nodig
    const proxyUrl=WORKER_URL+'/werkinstructies/open?id='+encodeURIComponent(file.id);
    window.open(proxyUrl,'_blank');
    return;
  }
  // Bestand niet gevonden in index
  alert('Bestand "'+link+'" niet gevonden.\nControleer de bestandsnaam in het Excel-tabblad.');
}

loadDocs();
loadFileIndex();
</script>
